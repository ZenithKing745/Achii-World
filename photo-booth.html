<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Photo Booth 🤳 - Achii's World</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .photo-card {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px;
        }

        #camera-feed {
            width: 100%;
            border-radius: 12px;
            background: #000;
            transform: scaleX(-1);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
        }

        .filter-button {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            border: 1.5px solid var(--color-card-border);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Lato', sans-serif;
            color: var(--color-text);
        }

        .filter-button.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            border-radius: 14px;
            text-align: center;
        }

        .overlay.visible {
            opacity: 1;
        }

        .flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            border-radius: 14px;
        }

        #camera-wrapper {
            position: relative;
        }

        #strip-preview {
            max-width: 360px;
            margin: 24px auto 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #strip-preview.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #strip-preview img {
            width: 100%;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: block;
        }

        .hidden-canvas {
            display: none;
        }

        .camera-error-card {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px;
            text-align: center;
        }

        @media (max-width: 520px) {
            .button-row {
                flex-direction: column;
            }

            .overlay {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <a href="index.php" class="back-link">Back to Home</a>

        <h1 class="section-title">Photo Booth 🤳</h1>
        <p class="section-sub">Strike a pose, just the two of us 💕</p>

        <div id="camera-card" class="card photo-card">
            <div id="camera-wrapper">
                <video id="camera-feed" autoplay playsinline muted></video>
                <div id="countdown-overlay" class="overlay"></div>
                <div id="flash" class="flash"></div>
            </div>

            <div class="filters" id="filter-buttons"></div>

            <div class="button-row">
                <button id="capture-button" class="btn">📸 Take Photo Strip</button>
            </div>
        </div>

        <div id="strip-preview"></div>

        <canvas id="photo-canvas" class="hidden-canvas"></canvas>
        <canvas id="strip-canvas" class="hidden-canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const captureButton = document.getElementById('capture-button');
        const filterButtons = document.getElementById('filter-buttons');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const flash = document.getElementById('flash');
        const stripPreview = document.getElementById('strip-preview');
        const photoCanvas = document.getElementById('photo-canvas');
        const stripCanvas = document.getElementById('strip-canvas');

        const filters = [
            { name: 'No Filter', value: 'none' },
            { name: 'Warm', value: 'sepia(0.25) saturate(1.5) brightness(1.08)' },
            { name: 'Cool', value: 'saturate(0.7) hue-rotate(20deg) brightness(1.1)' },
            { name: 'B&W', value: 'grayscale(1) contrast(1.2)' },
            { name: 'Soft Pink', value: 'sepia(0.15) saturate(1.8) hue-rotate(310deg) brightness(1.05)' },
            { name: 'Vintage', value: 'sepia(0.45) contrast(1.15) brightness(0.92) saturate(0.85)' }
        ];

        let activeFilter = 'none';
        let photos = [];

        function createFilterButtons() {
            filters.forEach((filter, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'filter-button' + (index === 0 ? ' active' : '');
                button.textContent = filter.name;
                button.addEventListener('click', () => {
                    document.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    activeFilter = filter.value;
                    video.style.filter = activeFilter;
                });
                filterButtons.appendChild(button);
            });
        }

        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showCameraError();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) {
                showCameraError();
            }
        }

        function showCameraError() {
            document.getElementById('camera-card').style.display = 'none';
            stripPreview.style.display = 'none';
            const errorCard = document.createElement('div');
            errorCard.className = 'card camera-error-card';
            errorCard.innerHTML = '<h2 class="section-title" style="margin-bottom: 12px;">Camera Access Needed</h2><p style="font-family: \'Lato\', sans-serif; color: var(--color-text-muted); line-height:1.8;">📷 Camera access is needed for the photo booth. Please allow camera access in your browser settings and refresh the page.</p>';
            document.querySelector('.page-wrapper').appendChild(errorCard);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function showCountdown(label) {
            countdownOverlay.textContent = label;
            countdownOverlay.classList.add('visible');
            await sleep(500);
            countdownOverlay.classList.remove('visible');
            await sleep(200);
        }

        async function flashEffect() {
            flash.style.opacity = '0.9';
            await sleep(150);
            flash.style.opacity = '0';
        }

        function captureFrame() {
            const width = 640;
            const height = Math.round(width * video.videoHeight / video.videoWidth);
            photoCanvas.width = width;
            photoCanvas.height = height;
            const ctx = photoCanvas.getContext('2d');
            ctx.filter = activeFilter;
            ctx.translate(width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, width, height);
            return photoCanvas.toDataURL('image/png');
        }

        async function takePhotoStrip() {
            captureButton.disabled = true;
            photos = [];

            for (let i = 3; i >= 1; i--) {
                await showCountdown(i.toString());
            }
            await showCountdown('📸!');
            await flashEffect();
            photos.push(captureFrame());

            for (let count = 2; count <= 4; count++) {
                await sleep(900);
                for (let i = 3; i >= 1; i--) {
                    await showCountdown(i.toString());
                }
                await showCountdown('📸!');
                await flashEffect();
                photos.push(captureFrame());
            }

            renderStrip();
        }

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        function renderStrip() {
            const photoWidth = 320;
            const gap = 10;
            const padding = 10;

            Promise.all(photos.map(src => loadImage(src))).then(images => {
                const heights = images.map(img => Math.round(photoWidth * img.height / img.width));
                const totalHeight = heights.reduce((sum, h) => sum + h, 0) + gap * (images.length - 1) + padding * 2 + 40;

                stripCanvas.width = photoWidth;
                stripCanvas.height = totalHeight;
                const ctx = stripCanvas.getContext('2d');
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, photoWidth, totalHeight);

                let y = padding;
                images.forEach((img, index) => {
                    const imgHeight = heights[index];
                    ctx.drawImage(img, 0, y, photoWidth, imgHeight);
                    y += imgHeight + gap;
                });

                drawStripText(ctx, photoWidth, totalHeight, padding);

                ctx.strokeStyle = '#F4A7B9';
                ctx.lineWidth = 3;
                ctx.strokeRect(2, 2, photoWidth - 4, totalHeight - 4);

                const dataUrl = stripCanvas.toDataURL('image/png');
                stripPreview.innerHTML = `
          <img src="${dataUrl}" alt="Photo strip preview">
          <div class="button-row" style="margin-top: 16px;">
            <button id="download-button" class="btn">⬇️ Download Strip</button>
            <button id="retry-button" class="btn-outline">🔄 Try Again</button>
          </div>
        `;
                stripPreview.classList.add('visible');
                document.getElementById('download-button').addEventListener('click', downloadStrip);
                document.getElementById('retry-button').addEventListener('click', resetStrip);
            }).catch(() => {
                alert('Unable to create the photo strip. Please try again.');
                resetStrip();
            });
        }

        function drawStripText(ctx, width, height, padding) {
            const now = new Date();
            const dateString = now.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            ctx.fillStyle = '#3D2B35';
            ctx.font = '16px "Lato", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${dateString} 💕`, width / 2, height - padding - 10);
        }

        function getFormattedDate() {
            const now = new Date();
            return now.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }).replace(/ /g, '-');
        }

        function downloadStrip() {
            const link = document.createElement('a');
            link.download = `our-photobooth-strip-${getFormattedDate()}.png`;
            link.href = stripCanvas.toDataURL('image/png');
            link.click();
        }

        function resetStrip() {
            stripPreview.classList.remove('visible');
            stripPreview.innerHTML = '';
            captureButton.disabled = false;
            photos = [];
        }

        captureButton.addEventListener('click', takePhotoStrip);
        createFilterButtons();
        initCamera();
    </script>
    <script src="js/main.js"></script>
</body>

</html>
